<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebAudit AI Dashboard</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --primary: #38bdf8;
            --accent: #818cf8;
            --text: #f1f5f9;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5rem;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .search-box {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input {
            background: #0f172a;
            border: 1px solid #334155;
            padding: 14px;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border 0.3s;
        }

        input:focus {
            border-color: var(--primary);
        }

        button {
            background: linear-gradient(to right, #0ea5e9, #6366f1);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .results-area {
            margin-top: 30px;
            display: none;
        }

        .status {
            text-align: center;
            color: var(--primary);
            font-size: 0.9rem;
            margin-bottom: 15px;
            font-weight: 500;
        }

        #output {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            line-height: 1.6;
            white-space: pre-wrap;
            border-left: 4px solid var(--primary);
        }

        .loader {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 10px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>WebAudit AI Bot</h1>
        <p style="color: var(--text-dim)">Intelligent SEO & Accessibility Analysis</p>
    </header>

    <div class="search-box">
        <div class="input-group">
            <input type="text" id="url" placeholder="Enter URL (e.g. https://google.com)">
            <input type="text" id="task" placeholder="What should I do? (e.g. analyze and save)">
            <button id="runBtn" onclick="runAudit()">Run Audit</button>
        </div>
    </div>

    <div id="resultsArea" class="results-area">
        <div id="statusIndicator" class="status"></div>
        <div id="output"></div>
    </div>
</div>

<script>
    async function runAudit() {
        const url = document.getElementById('url').value;
        const task = document.getElementById('task').value;
        const btn = document.getElementById('runBtn');
        const resultsArea = document.getElementById('resultsArea');
        const output = document.getElementById('output');
        const status = document.getElementById('statusIndicator');

        if(!url) return alert("Please enter a URL");

        // UI State: Loading
        btn.disabled = true;
        resultsArea.style.display = 'block';
        status.innerHTML = '<div class="loader"></div> Agent is thinking...';
        output.innerText = "";

        try {
            const response = await fetch('http://127.0.0.1:8000/audit', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ url, task })
            });
            
            if (!response.ok) throw new Error("Server Error");

            const data = await response.json();
            
            status.innerHTML = "✅ Analysis Complete";
            output.innerText = data.summary;

        } catch (err) {
            status.innerHTML = "❌ Error occurred";
            output.innerText = "Failed to reach the backend. Make sure main.py is running on port 8000.";
        } finally {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
